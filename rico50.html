<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>50 Jahre Rico 🎆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
    gap: 0.2rem;
  }
  .title-text {
    font-weight: 900;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.1;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding: 0 20px;
  }
  .title-text.visible {
    opacity: 1;
    transform: scale(1);
  }
  .years {
    font-size: clamp(6rem, 25vw, 15rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #FFD700, #FF8C00, #FF4500, #FFD700);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2s linear infinite;
    filter: drop-shadow(0 0 20px rgba(255, 165, 0, 0.8));
    display: block;
  }
  .name {
    color: #fff;
    font-size: clamp(2.5rem, 10vw, 6rem);
    font-style: italic;
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 60px rgba(255,255,255,0.4);
    display: block;
  }
  .jahre {
    color: #FFD700;
    font-size: clamp(1.5rem, 6vw, 3.5rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,215,0,0.8);
    display: block;
  }
  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  #tap-hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
    z-index: 20;
    white-space: nowrap;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div class="title-text" id="t1"><span class="years">50</span></div>
  <div class="title-text" id="t2"><span class="jahre">Jahre</span></div>
  <div class="title-text" id="t3"><span class="name">Rico</span></div>
</div>
<div id="tap-hint">Tippen für mehr Feuerwerk ✨</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y, color, vx, vy, size, life) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.size = size || 3;
    this.life = life || 1;
    this.decay = 0.012 + Math.random() * 0.015;
    this.gravity = 0.08;
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y, life: this.life});
    if (this.trail.length > 6) this.trail.shift();
    this.vy += this.gravity;
    this.vx *= 0.99;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    return this.life > 0;
  }
  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const a = (i / this.trail.length) * this.life * 0.4;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * (i / this.trail.length) * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = this.color.replace('1)', `${a})`);
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace('1)', `${this.life})`);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace('1)', `${this.life * 0.15})`);
    ctx.fill();
  }
}

class Rocket {
  constructor(x, targetX, targetY) {
    this.x = x || Math.random() * canvas.width;
    this.y = canvas.height + 20;
    this.targetX = targetX || this.x + (Math.random() - 0.5) * 200;
    this.targetY = targetY || canvas.height * (0.15 + Math.random() * 0.45);
    const dx = this.targetX - this.x;
    const dy = this.targetY - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const speed = 12 + Math.random() * 6;
    this.vx = (dx / dist) * speed;
    this.vy = (dy / dist) * speed;
    this.trail = [];
    this.exploded = false;
    this.color = randomColor();
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 20) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.15;
    if (this.y <= this.targetY || this.vy >= 0) {
      this.explode();
      return false;
    }
    return true;
  }
  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      const a = (i / this.trail.length) * 0.8;
      const s = (i / this.trail.length) * 3;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, s, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 220, 100, ${a})`;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
  explode() {
    if (this.exploded) return;
    this.exploded = true;
    const type = Math.floor(Math.random() * 5);
    const count = 80 + Math.floor(Math.random() * 60);
    for (let i = 0; i < count; i++) {
      let vx, vy;
      const angle = (i / count) * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      if (type === 0) {
        vx = Math.cos(angle) * speed * 1.5;
        vy = Math.sin(angle) * speed * 1.5;
      } else if (type === 1) {
        const r = i % 2 === 0 ? speed * 2 : speed * 0.8;
        vx = Math.cos(angle) * r;
        vy = Math.sin(angle) * r;
      } else if (type === 2) {
        const r = i % 3 === 0 ? speed * 2.2 : speed;
        vx = Math.cos(angle) * r;
        vy = Math.sin(angle) * r;
      } else {
        vx = (Math.random() - 0.5) * speed * 3;
        vy = (Math.random() - 0.5) * speed * 3;
      }
      const c = type === 4 ? randomColor() : this.color;
      particles.push(new Particle(this.x, this.y, c, vx, vy, 2.5 + Math.random() * 2));
    }
    if (Math.random() > 0.5) {
      setTimeout(() => {
        for (let i = 0; i < 30; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1 + Math.random() * 3;
          particles.push(new Particle(
            this.x + (Math.random()-0.5)*30,
            this.y + (Math.random()-0.5)*30,
            randomColor(),
            Math.cos(angle)*speed, Math.sin(angle)*speed,
            1.5 + Math.random()
          ));
        }
      }, 150);
    }
    flashes.push({x: this.x, y: this.y, r: 0, maxR: 80 + Math.random()*60, color: this.color, life: 1});
  }
}

function randomColor() {
  const colors = [
    'rgba(255, 215, 0, 1)',
    'rgba(255, 69, 0, 1)',
    'rgba(255, 140, 0, 1)',
    'rgba(0, 191, 255, 1)',
    'rgba(50, 205, 50, 1)',
    'rgba(255, 20, 147, 1)',
    'rgba(138, 43, 226, 1)',
    'rgba(255, 255, 255, 1)',
    'rgba(0, 255, 200, 1)',
    'rgba(255, 165, 0, 1)',
  ];
  return colors[Math.floor(Math.random() * colors.length)];
}

let particles = [];
let rockets = [];
let flashes = [];
let frameCount = 0;

function showText() {
  document.getElementById('t1').classList.add('visible');
  setTimeout(() => document.getElementById('t2').classList.add('visible'), 200);
  setTimeout(() => document.getElementById('t3').classList.add('visible'), 400);
  setTimeout(hideText, 3000);
}
function hideText() {
  ['t1','t2','t3'].forEach(id => document.getElementById(id).classList.remove('visible'));
  setTimeout(showText, 4000 + Math.random()*3000);
}

function launchRocket(x, y) {
  rockets.push(new Rocket(x, x, y));
}
function launchRandomRocket() {
  const x = canvas.width * (0.1 + Math.random() * 0.8);
  rockets.push(new Rocket(x));
}
function autoLaunch() {
  launchRandomRocket();
  setTimeout(autoLaunch, 400 + Math.random() * 1200);
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  for (let i = 0; i < 3; i++) {
    setTimeout(() => launchRocket(x + (Math.random()-0.5)*100, y + (Math.random()-0.5)*100), i * 100);
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
  for (let i = 0; i < 3; i++) {
    setTimeout(() => launchRocket(x + (Math.random()-0.5)*100, y + (Math.random()-0.5)*100), i * 100);
  }
}, {passive: false});

function animate() {
  requestAnimationFrame(animate);
  frameCount++;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  flashes = flashes.filter(f => {
    f.r += 8;
    f.life -= 0.08;
    if (f.life <= 0) return false;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = f.color.replace('1)', `${f.life * 0.3})`);
    ctx.fill();
    return true;
  });

  rockets = rockets.filter(r => r.update());
  rockets.forEach(r => r.draw());
  particles = particles.filter(p => p.update());
  particles.forEach(p => p.draw());

  if (frameCount % 3 === 0) {
    for (let i = 0; i < 3; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height * 0.8;
      ctx.beginPath();
      ctx.arc(x, y, Math.random() * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.4})`;
      ctx.fill();
    }
  }
}

animate();
setTimeout(autoLaunch, 200);
setTimeout(showText, 2500);
</script>
</body>
</html>
